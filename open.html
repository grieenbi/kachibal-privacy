<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>까치발 — 발자국 보기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #FAF8F3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 36px 28px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      border: 1px solid #E8E0D5;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    }
    .app-name {
      font-size: 22px;
      font-weight: 700;
      color: #2C1810;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }
    .tagline {
      font-size: 13px;
      color: #8B6B4A;
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .blind-box {
      background: #F5F0E8;
      border: 1px solid #E8E0D5;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .lock-icon { font-size: 28px; margin-bottom: 10px; }
    .blind-text {
      font-size: 14px;
      font-weight: 700;
      color: #2C1810;
      line-height: 1.6;
      margin-bottom: 6px;
    }
    .blind-sub {
      font-size: 12px;
      color: #8B6B4A;
      line-height: 1.5;
    }
    .btn-primary {
      display: block;
      background: #F56840;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      padding: 15px;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
      transition: opacity 0.15s;
    }
    .btn-primary:active { opacity: 0.85; }
    .btn-secondary {
      display: block;
      background: #F5F0E8;
      color: #2C1810;
      text-decoration: none;
      border-radius: 12px;
      padding: 15px;
      font-size: 14px;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    .btn-secondary:active { opacity: 0.85; }
    .divider {
      border: none;
      border-top: 1px solid #E8E0D5;
      margin: 20px 0;
    }
    .footer {
      font-size: 11px;
      color: #B0A090;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="app-name">까치발</div>
    <div class="tagline">누군가의 문장 끝에서<br>내 이야기가 시작됩니다</div>

    <div class="blind-box">
      <div class="lock-icon">✍️</div>
      <div class="blind-text">누군가 당신에게<br>이 글을 보여주고 싶어해요</div>
      <div class="blind-sub">까치발 앱에서 전체 이야기를 읽을 수 있어요</div>
    </div>

    <a id="btn-open" class="btn-primary" href="#">이야기 읽으러 가기</a>
    <a id="btn-store" class="btn-secondary"
       href="https://play.google.com/store/apps/details?id=com.grieenbi.kachbal">
      📲 까치발 앱 설치하기
    </a>

    <hr class="divider" />
    <div class="footer">
      까치발은 매주 짧은 문장을 함께 이어 쓰는 릴레이 에세이 앱이에요.<br>
      앱이 이미 있다면 위 버튼을 눌러주세요.
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const btn = document.getElementById('btn-open');

    if (id) {
      const deepLink = 'kachbal://essay?id=' + id;
      btn.href = deepLink;

      // 앱이 설치된 경우 자동으로 열기 시도
      setTimeout(function() {
        window.location.href = deepLink;
      }, 800);
    } else {
      btn.href = 'kachbal://';
    }
  </script>
</body>
</html>
